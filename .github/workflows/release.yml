name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package
        run: |
          ASSET=herdr-espresso-aarch64-apple-darwin.tar.gz
          tar -czf "$ASSET" -C target/aarch64-apple-darwin/release herdr-espresso
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            herdr-espresso-aarch64-apple-darwin.tar.gz
            herdr-espresso-aarch64-apple-darwin.tar.gz.sha256
